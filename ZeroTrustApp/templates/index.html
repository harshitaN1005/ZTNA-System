{% load static %}
<!DOCTYPE html>
<html>

<head>

	<title>Blockchain Based ZTNA System</title>
	<meta charset="utf-8">

	<link rel="stylesheet" type="text/css" href="{% static 'style.css' %}">

	<style>
		/* Welcome Section */

		.welcome {
			text-align: center;
			padding: 40px 20px 10px 20px;
		}

		.welcome h2 {
			font-size: 34px;
			color: #1d3557;
			margin-bottom: 8px;
		}

		.welcome p {
			font-size: 18px;
			color: #444;
		}

		/* Hero Image */

		.hero {
			width: 90%;
			max-width: 900px;
			height: 35vh;
			margin: 20px auto;
			border-radius: 10px;
			background:url("{% static 'images/blockchain.jpg' %}");
			background-size: cover;
			background-position: center;
		}

		/* Button Section */

		.main-buttons {
			text-align: center;
			padding: 25px 0 40px 0;
		}

		.main-buttons a {
			text-decoration: none;
			background: #a8dadc;
			color: #1d3557;
			padding: 14px 28px;
			border-radius: 6px;
			margin: 10px;
			display: inline-block;
			font-size: 16px;
			font-weight: 500;
			transition: 0.3s;
		}

		.main-buttons a:hover {
			background: #90c2d1;
		}
	</style>

</head>

<body>

	<div id="wrapper">

		<div id="header">
			<h1>Blockchain Based ZTNA System</h1>
		</div>

		<!-- Welcome Text -->

		<div class="welcome">
			<h2>Welcome to Secure ZTNA System</h2>
			<p>Blockchain Powered Secure Access Platform</p>
		</div>

		<!-- Image -->

		<div class="hero"></div>

		<!-- Navigation Buttons -->

		<div class="main-buttons">

			<a href="{% url 'index' %}">Home</a>

			<a href="{% url 'UserLogin' %}">User Login</a>

			<a href="{% url 'Register' %}">New User Signup</a>

		</div>

		<footer id="footer">
			Blockchain Based ZTNA System | Secure Access Control
		</footer>

	</div>

</body>

</html>
